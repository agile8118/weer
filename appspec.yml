# This is an old file that needs to be updated to match the new build process. It is currently not used in the project, 
# but it may be useful as a reference for setting up CI/CD pipelines in the future.

version: 0.0
os: linux
files:
  - source: ./
    destination: /home/ec2-user/url-shortener
    overwrite: yes
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: ec2-user
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ec2-user
