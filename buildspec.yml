# This is an old file that needs to be updated to match the new build process. It is currently not used in the project, 
# but it may be useful as a reference for setting up CI/CD pipelines in the future.

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 10
  pre_build:
    commands:
      - echo Installing app dependencies...
      - npm install
      - cd ./client-js && npm install && cd ..
      - cd ./sass && npm install && cd ..
  build:
    commands:
      - echo Building files...
      - npm run build
      - echo Running tests...
      - npm test

artifacts:
  files:
    - public/*
    - scripts/*
    - server/**/*
    - appspec.yml
    - package-lock.json
    - package.json

cache:
  paths:
    - "./node_modules/**/*"
    - "./client-js/node_modules/**/*"
    - "./sass/node_modules/**/*"
